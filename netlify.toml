[build]
  # Run from the repo root so pnpm workspace is available
  command = "pnpm install && pnpm --filter @workspace/ahmed-portfolio run build"
  publish = "artifacts/ahmed-portfolio/dist/public"

[build.environment]
  NODE_VERSION  = "20"
  NODE_ENV      = "production"
  BASE_PATH     = "/"
  NETLIFY       = "true"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
